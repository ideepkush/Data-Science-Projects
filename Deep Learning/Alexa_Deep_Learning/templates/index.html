<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexa Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
    <div class="blob-wrapper">
        <div class="blob1"></div>
        <div class="blob2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Ova <span>Assistant</span></h1>
            <p>Your intelligent desktop companion</p>
        </header>

        <main>
            <div class="orb-container">
                <div id="orb" class="orb state-idle">
                    <div class="orb-inner"></div>
                </div>
            </div>

            <div class="status-panel">
                <p id="status-text" class="status-text">Ready to help.</p>
                <div class="conversation">
                    <div class="bubble user-bubble" id="user-transcript" style="display: none;">
                        <span class="label">You said:</span>
                        <p id="transcript-text">...</p>
                    </div>
                    <div class="bubble bot-bubble" id="bot-response" style="display: none;">
                        <span class="label">Alexa:</span>
                        <p id="response-text">...</p>
                    </div>
                </div>
            </div>

            <button id="listen-btn" class="listen-btn">
                <svg id="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="22"></line>
                </svg>
                Wake Alexa
            </button>
        </main>
    </div>

    <script src="/frontend/js/app.js"></script>
</body>
</html>
